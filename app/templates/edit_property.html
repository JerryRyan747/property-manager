{% extends "base.html" %}

{% block content %}

<h1>Edit Property</h1>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">Property Name</label>

        <input

            class="form-control"

            type="text"

            name="name"

            value="{{ property.name }}"

            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Address</label>

        <input

            class="form-control"

            type="text"

            name="address"

            value="{{ property.address }}"

            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Purchase Price</label>

        <input

            class="form-control"

            type="number"

            step="0.01"

            name="purchase_price"

            value="{{ property.purchase_price }}"

            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Current Value</label>

        <input

            class="form-control"

            type="number"

            step="0.01"

            name="current_value"

            value="{{ property.current_value or '' }}">

    </div>

    <button type="submit" class="btn btn-success">

        Save Changes

    </button>

    <a href="{{ url_for('main.home') }}" class="btn btn-secondary">

        Cancel

    </a>

</form>

{% endblock %}
